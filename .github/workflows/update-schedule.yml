name: Update Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Update schedule (with retries)
        shell: bash
        env:
          CI: "true"
        run: |
          set -e
          for attempt in 1 2 3; do
            echo "Update attempt $attempt/3"
            if npm run update:schedule; then
              echo "Update succeeded."
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Update failed; retrying in 45 seconds..."
              sleep 45
            fi
          done
          echo "Update failed after 3 attempts."
          exit 1

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/schedule.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update schedule data"
          git push
